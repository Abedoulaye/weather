<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Data Logger</title>
</head>
<body>

<input type="text" id="city-input" placeholder="Enter city name">
<button id="search-btn">Search</button>

<script>
const cityInput = document.getElementById("city-input")
const searchBtn = document.getElementById("search-btn")

async function geoCode(cityName) {
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=5&language=en&format=json`;
    try {
        const res = await fetch(url)
        const data = await res.json()
        const bestMatch = data.results[0]
        return `https://api.open-meteo.com/v1/forecast?latitude=${bestMatch.latitude}&longitude=${bestMatch.longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,apparent_temperature&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
    } catch(e) {
        console.error(e)
    }
}

async function getWeather(cityName) {
    const weatherUrl = await geoCode(cityName)
    if (!weatherUrl) return
    const res = await fetch(weatherUrl)
    const data = await res.json()
    console.log("FULL WEATHER DATA:", data)
    console.log("Current:", data.current)
    console.log("Daily:", data.daily)
    console.table(data.current) // nice table view
}

searchBtn.addEventListener("click", () => {
    const cityName = cityInput.value.trim()
    if (cityName) getWeather(cityName)
})
</script>

</body>
</html>
