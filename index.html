<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <div class="search-box">
        <input type="text" id="city-input" placeholder="Search for a city...">
        <button id="search-btn">🔍</button>
    </div>

    <div class="weather-card">

        <h2 id="city">New York</h2>
        <p id="date">Monday, June 29</p>

        <div class="weather-icon">
            ☀️
        </div>

        <h1 id="temperature">74°F</h1>

        <p id="description">Sunny</p>

        <div class="details">

            <div class="detail-box">
                <span>💧</span>
                <p>Humidity</p>
                <h3 id="humidity">54%</h3>
            </div>

            <div class="detail-box">
                <span>💨</span>
                <p>Wind</p>
                <h3 id="wind">8 mph</h3>
            </div>

            <div class="detail-box">
                <span>🌡️</span>
                <p>Feels Like</p>
                <h3 id="feelsLike">76°F</h3>
            </div>

        </div>

    </div>

</div>

</body>
</html>
